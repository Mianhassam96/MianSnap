<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="300" fill="rgba(124,58,237,0.08)"/>
  <circle cx="1000" cy="400" r="250" fill="rgba(79,70,229,0.06)"/>

  <!-- Left side: Before/After demo -->
  <rect x="60" y="120" width="480" height="390" rx="16" fill="#111128" stroke="rgba(124,58,237,0.4)" stroke-width="1.5"/>

  <!-- Before half -->
  <rect x="60" y="120" width="240" height="390" rx="16" fill="#0f0f1a"/>
  <text x="180" y="290" text-anchor="middle" font-family="Arial" font-size="14" fill="#555">Plain video frame</text>
  <text x="180" y="312" text-anchor="middle" font-family="Arial" font-size="12" fill="#444">No text · No style</text>
  <rect x="80" y="130" width="60" height="22" rx="4" fill="rgba(0,0,0,0.7)"/>
  <text x="110" y="145" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#666">BEFORE</text>
  <rect x="200" y="478" width="80" height="20" rx="4" fill="rgba(0,0,0,0.6)"/>
  <text x="240" y="492" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Score: 32/100</text>

  <!-- After half -->
  <rect x="300" y="120" width="240" height="390" rx="0 16 16 0" fill="#0d0020"/>
  <text x="420" y="275" text-anchor="middle" font-family="Impact,Arial" font-size="22" font-weight="bold" fill="#ffff00" filter="url(#glow)">YOU WON'T</text>
  <text x="420" y="305" text-anchor="middle" font-family="Impact,Arial" font-size="22" font-weight="bold" fill="#ffff00" filter="url(#glow)">BELIEVE THIS</text>
  <rect x="460" y="130" width="60" height="22" rx="4" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="490" y="145" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4ade80">AFTER ⚡</text>
  <rect x="380" y="478" width="100" height="20" rx="4" fill="rgba(74,222,128,0.15)"/>
  <text x="430" y="492" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#4ade80">🔥 Score: 87/100</text>

  <!-- Divider -->
  <line x1="540" y1="120" x2="540" y2="510" stroke="white" stroke-width="2" opacity="0.6"/>
  <circle cx="540" cy="315" r="16" fill="white" opacity="0.9"/>
  <text x="540" y="321" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">⇔</text>

  <!-- Right side: Text -->
  <text x="700" y="200" font-family="Arial" font-size="13" font-weight="bold" fill="rgba(124,58,237,0.9)" letter-spacing="2">MIANSNAP</text>

  <text x="700" y="260" font-family="Arial" font-size="42" font-weight="900" fill="white">Turn any video</text>
  <text x="700" y="315" font-family="Arial" font-size="42" font-weight="900" fill="white">into a viral</text>
  <text x="700" y="370" font-family="Arial" font-size="42" font-weight="900">
    <tspan fill="url(#accent)">thumbnail</tspan>
  </text>

  <text x="700" y="420" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.6)">Upload video → AI picks best frame → 1 click</text>

  <!-- Pills -->
  <rect x="700" y="445" width="100" height="28" rx="14" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="750" y="463" text-anchor="middle" font-family="Arial" font-size="11" fill="#a78bfa">Free forever</text>

  <rect x="812" y="445" width="110" height="28" rx="14" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="867" y="463" text-anchor="middle" font-family="Arial" font-size="11" fill="#a78bfa">No account</text>

  <rect x="934" y="445" width="120" height="28" rx="14" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="994" y="463" text-anchor="middle" font-family="Arial" font-size="11" fill="#a78bfa">100% private</text>

  <!-- URL -->
  <text x="700" y="560" font-family="Arial" font-size="14" fill="rgba(255,255,255,0.4)">mianhassam96.github.io/MianSnap</text>
</svg>
