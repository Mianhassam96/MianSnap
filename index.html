    <!-- Fabric.js from CDN (externalized from bundle to fix CI build) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #f5f5ff;
        color: #0a0a1a;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Scrollbars */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #7c3aed; }
      /* Animations */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeInDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
      @keyframes progressBar { from { width: 0%; } to { width: 100%; } }
      .fade-in { animation: fadeIn 0.25s ease both; }
      .slide-in { animation: slideIn 0.2s ease both; }
      .scale-in { animation: scaleIn 0.2s ease both; }
      button { font-family: inherit; }
      input, select, textarea { font-family: inherit; }
      /* Smooth transitions for theme switching */
      * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease; }
      canvas, img, video { transition: none !important; }
      input, select { transition: border-color 0.15s ease !important; }

      /* ── RESPONSIVE ── */
      /* Mobile: hide sidebars, show bottom tab bar */
      @media (max-width: 768px) {
        .ms-left-sidebar  { display: none !important; }
        .ms-right-sidebar { display: none !important; }
        .ms-bottom-panel  { display: none !important; }
        .ms-mobile-tabs   { display: flex !important; }
        .ms-canvas-area   { padding: 8px !important; }
        .ms-topbar-name   { display: none !important; }
        .ms-topbar-selects { display: none !important; }
        .ms-fab { bottom: 72px !important; right: 12px !important; padding: 10px 16px !important; font-size: 12px !important; }
        .ms-score-badge { top: 6px !important; font-size: 10px !important; padding: 3px 10px !important; }
      }
      @media (max-width: 480px) {
        .ms-topbar-save { display: none !important; }
        .ms-topbar-projects { display: none !important; }
      }
      /* Tablet: compact layout */
      @media (min-width: 769px) and (max-width: 1024px) {
        .ms-left-sidebar  { width: 200px !important; }
        .ms-right-sidebar { width: 180px !important; }
      }
      /* Mobile tabs — hidden by default, shown on mobile */
      .ms-mobile-tabs { display: none; }
      /* Mobile: larger touch targets */
      @media (max-width: 768px) {
        .canvas-container { touch-action: none; }
        .canvas-container .upper-canvas { touch-action: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

  </body>
